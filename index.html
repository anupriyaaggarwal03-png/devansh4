<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Royal Inquiry ❤️</title>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Retro Floral Wallpaper Look */
            background-color: #f5f5f5; 
            background-image: radial-gradient(#d4af37 0.5px, transparent 0.5px), radial-gradient(#d4af37 0.5px, #f5f5f5 0.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: 'Georgia', serif;
            text-align: center;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        .container {
            background: #fffdfa; /* Creamy parchment color */
            padding: 2.5rem;
            border-radius: 5px;
            /* Elegant Ornate Border */
            border: 8px double #d4af37;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 85%;
            max-width: 420px;
            z-index: 1;
            transition: all 0.5s ease;
            position: relative;
        }

        /* Success Background Lighting Up */
        .success-glow {
            animation: bgLightUp 2s infinite alternate;
        }

        @keyframes bgLightUp {
            from { box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: #d4af37; }
            to { box-shadow: 0 0 50px rgba(255, 0, 0, 0.3); border-color: #ff0000; }
        }

        .media-style {
            width: 170px;
            height: 170px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #d4af37;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .flower-gif {
            width: 240px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 2px solid #d4af37;
        }

        h1 {
            color: #8b0000; /* Deep Crimson */
            font-size: 1.8rem;
            margin: 0 0 1.2rem 0;
            line-height: 1.4;
            font-style: italic;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.05);
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            border-radius: 4px; /* Sharper, more classic edges */
            border: 1px solid #d4af37;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-family: 'Georgia', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #yesBtn {
            background-color: #8b0000;
            color: #f5f5f5;
            position: relative;
            z-index: 100;
        }

        @keyframes glowing {
            0% { box-shadow: 0 0 5px #8b0000; }
            50% { box-shadow: 0 0 25px #ff0000, 0 0 40px #d4af37; }
            100% { box-shadow: 0 0 5px #8b0000; }
        }

        .pulse-glow {
            animation: glowing 1.5s infinite;
        }

        #noBtn {
            background-color: transparent;
            color: #555;
            border: 1px solid #ccc;
        }

        #celebration, #flower-page {
            display: none;
        }

        .sub-text {
            color: #7a6e5d;
            font-size: 0.85rem;
            margin-top: 15px;
            font-style: italic;
        }

        .wait-text {
            font-size: 1.3rem;
            color: #8b0000;
            font-weight: normal;
            font-style: italic;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Page 1: The Request -->
    <div class="container" id="main-content">
        <div class="img-container">
            <img src="us.jpeg" alt="Our Portrait" class="media-style">
        </div>
        <h1 id="questionText">Devansh, would you do me the honor of being my boyfriend?</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">I Shall</button>
            <button id="noBtn" onclick="makeYesBigger()">Decline</button>
        </div>
        <p class="sub-text">— Kindly ensure your volume is adjusted 🔊 —</p>
    </div>

    <!-- Page 2: The Celebration -->
    <div id="celebration" class="container">
        <div class="img-container">
            <video id="successVideo" class="media-style" autoplay muted loop playsinline>
                <source src="celebration.mp4" type="video/mp4">
            </video>
        </div>
        <h1>The Ton Shall Hear of This! 🥰 ❤️</h1>
        <div class="wait-text">A most excellent decision, my dear.</div>
    </div>

    <!-- Page 3: The Flowers -->
    <div id="flower-page" class="container">
        <div id="flower-gif-container">
            <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueW9ubm8zbmR6Mmt4eHk3ZzB0bmF0MHB3emN6ZTNidW55ZmtxdyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/V8p1yMUKTInuI0yS26/giphy.gif" alt="Regency Flowers" class="flower-gif">
        </div>
        <h1>Pray, wait a moment...</h1>
        <p class="wait-text">A bouquet for the finest gentleman. 💐🌹</p>
    </div>

    <script>
        let yesSize = 1;
        const messages = ["Are you quite certain?", "Consider your heart... 🥺", "Devansh, I implore you...", "A most cruel jest!", "I shall be inconsolable... 😭", "Choose the crimson heart! ❤️"];
        let messageIndex = 0;

        function playMusic() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(() => {});
        }

        function makeYesBigger() {
            playMusic(); 
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            yesBtn.classList.add('pulse-glow');
            yesSize += 0.4;
            yesBtn.style.transform = `scale(${yesSize})`;
            
            if (messageIndex < messages.length) {
                noBtn.innerText = messages[messageIndex];
                messageIndex++;
            } else {
                noBtn.innerText = "Yield to Yes! ❤️";
            }
        }

        function celebrate() {
            playMusic();
            document.getElementById('main-content').style.display = 'none';
            
            const celebrationContainer = document.getElementById('celebration');
            celebrationContainer.style.display = 'block';
            celebrationContainer.classList.add('success-glow');
            document.body.style.backgroundColor = "#fff0f0"; 
            
            const video = document.getElementById('successVideo');
            video.addEventListener('click', function() {
                video.muted = !video.muted;
                if (!video.muted) video.play();
            });

            startConfetti();

            // 39 Second Timer
            setTimeout(() => {
                celebrationContainer.style.opacity = '0';
                setTimeout(() => {
                    celebrationContainer.style.display = 'none';
                    const flowerPage = document.getElementById('flower-page');
                    flowerPage.style.display = 'block';
                    flowerPage.classList.add('success-glow');
                    flowerPage.style.opacity = '1';
                }, 500);
            }, 39000);

            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }

        function startConfetti() {
            var duration = 39 * 1000;
            var animationEnd = Date.now() + duration;
            // Gold and Red confetti for Bridgerton theme
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0, colors: ['#d4af37', '#8b0000', '#ffffff'] };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
